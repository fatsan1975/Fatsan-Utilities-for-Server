command-costs:
  # 0 = ucretsiz. Varsayilan tum temel teleport komutlari 100 birimdir.
  rtp: 100.0
  tpa: 100.0
  spawn: 100.0
  home: 100.0
  sethome: 100.0

tpa:
  request-expire-millis: 30000
  overwrite-request: true
  teleport-delay-ticks: 0
  cancel-on-move: true

spawn:
  delay-ticks: 0
  cancel-on-move: false

home:
  # Varsayilan maksimum home sayisi. Artirmak icin permission kullan:
  # fatsanutilities.homes.max.<sayi>  (orn: fatsanutilities.homes.max.10)
  # fatsanutilities.homes.unlimited - sinirsiz
  default-max: 3
  # /home kullanildiktan sonra tekrar kullanabilmek icin bekleme (ms)
  teleport-cooldown-millis: 5000
  # /sethome icin cooldown (ms). 0 ise yok.
  sethome-cooldown-millis: 0
  # Isinlanma gecikmesi (tick). 20 tick = 1 saniye
  delay-ticks: 0
  # Gecikme suresinde oyuncu hareket ederse iptal et
  cancel-on-move: true

rtp:
  delay-ticks: 0
  cancel-on-move: false
  # /rtp yazinca varsayilan olarak kullanilacak dunya
  default-world: world

  # RTP cooldown (ms). Eger burasi yoksa cooldowns.yml -> commands.rtp degeri kullanilir.
  cooldown-millis: 5000

  default:
    min-coordinate: -1500
    max-coordinate: 1500
    max-attempts: 30
    denied-biomes:
      - OCEAN
      - DEEP_OCEAN
      - COLD_OCEAN
      - DEEP_COLD_OCEAN
      - LUKEWARM_OCEAN
      - DEEP_LUKEWARM_OCEAN
      - WARM_OCEAN
      - DEEP_FROZEN_OCEAN
      - FROZEN_OCEAN
    denied-ground-materials:
      - WATER
      - LAVA
      - MAGMA_BLOCK
      - CAMPFIRE
      - SOUL_CAMPFIRE

  worlds:
    world:
      enabled: true
      min-coordinate: -2000
      max-coordinate: 2000
      max-attempts: 35

    world_nether:
      enabled: true
      min-coordinate: -1000
      max-coordinate: 1000
      max-attempts: 40
      denied-ground-materials:
        - LAVA
        - MAGMA_BLOCK
        - FIRE
        - SOUL_FIRE

    world_the_end:
      enabled: false
